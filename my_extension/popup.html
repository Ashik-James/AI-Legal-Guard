<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 420px; max-height: 600px; padding: 15px; font-family: sans-serif; background: #fff; }
        button { width: 100%; padding: 12px; font-size: 15px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
        #verdictBox { display: none; margin-top: 15px; padding: 12px; background: #fff0f0; border-left: 5px solid #d93025; font-size: 14px; color: #333; line-height: 1.4; border-radius: 4px; }
        #status { margin-top: 10px; font-size: 13px; color: #666; font-style: italic; }
        #resultsList { margin-top: 10px; list-style-type: none; padding: 0; max-height: 300px; overflow-y: auto; border-top: 1px solid #ddd; }
        .unfair-item { padding: 12px 5px; border-bottom: 1px solid #eee; color: #d93025; font-size: 13px; cursor: pointer; font-weight: bold; }
        .unfair-item:hover { background: #fff8f8; }
        .explanation-box { margin-top: 8px; padding: 10px; background: #f0f7ff; border-radius: 5px; color: #333; font-weight: normal; border-left: 4px solid #007bff; }
    </style>
</head>
<body>
    <h3>AI Legal Guard</h3>
    <button id="analyzePageBtn">Auto-Scan & Verdict</button>
    <div id="verdictBox"><strong>Final Verdict:</strong><br><span id="verdictText">...</span></div>
    <div id="status">Ready to scan the website.</div>
    <ul id="resultsList"></ul>
    <script src="popup.js"></script>
</body>
</html>
